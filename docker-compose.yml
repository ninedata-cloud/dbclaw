version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartdba-postgres
    environment:
      POSTGRES_USER: smartdba
      POSTGRES_PASSWORD: smartdba
      POSTGRES_DB: smartdba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdba -d smartdba"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
