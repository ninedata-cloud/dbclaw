id: hana_get_db_size
name: HANA Database Size
version: 1.0.0
author: DBClaw
category: hana
description: Get SAP HANA database size information including data size and log size for capacity monitoring
tags: [hana, size, storage, capacity]

parameters:
  - name: datasource_id
    type: integer
    required: true
    description: The database connection ID

permissions:
  - execute_query

code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      query = """
      SELECT
          SUM(DISK_SIZE) as total_size
      FROM SYS.M_TABLE_PERSISTENCE_STATISTICS
      """

      result = await context.execute_query(query, datasource_id)

      if not result.get("success"):
          return {"success": False, "error": result.get("error", "Failed to get database size")}

      data = result.get("data", [[0]])[0]

      return {
          "success": True,
          "size_info": {
              "total_size_bytes": data[0] or 0,
          }
      }
