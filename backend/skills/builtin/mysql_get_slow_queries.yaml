id: mysql_get_slow_queries
name: MySQL Slow Queries
version: 1.0.0
author: DBClaw
category: mysql
description: Get recent MySQL slow queries for performance analysis
tags: [mysql, slow-queries, performance]

parameters:
  - name: datasource_id
    type: integer
    required: true
    description: The database connection ID

permissions:
  - execute_query

code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      # Check if slow query log is enabled
      result = await context.execute_query(
          "SHOW VARIABLES LIKE 'slow_query_log'",
          datasource_id
      )

      if not result.get("success"):
          return {"success": False, "error": "Failed to check slow query log status"}

      slow_log_enabled = False
      if result.get("data") and len(result["data"]) > 0:
          slow_log_enabled = result["data"][0][1].lower() == "on"

      if not slow_log_enabled:
          return {
              "success": True,
              "slow_log_enabled": False,
              "message": "Slow query log is not enabled"
          }

      # Get slow query log file location
      result = await context.execute_query(
          "SHOW VARIABLES LIKE 'slow_query_log_file'",
          datasource_id
      )

      log_file = None
      if result.get("success") and result.get("data"):
          log_file = result["data"][0][1]

      return {
          "success": True,
          "slow_log_enabled": True,
          "log_file": log_file,
          "message": "Slow query log is enabled. Use execute_os_command to read the log file."
      }
