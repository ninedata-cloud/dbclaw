id: mssql_get_index_usage
name: SQL Server Index Usage
version: 1.0.0
author: DBClaw
category: sqlserver
description: Analyze index usage patterns to identify unused or inefficient indexes
tags: [sqlserver, indexes, performance, optimization]

parameters:
  - name: datasource_id
    type: integer
    required: true
    description: The database connection ID

permissions:
  - execute_query

code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      query = """
      SELECT
          OBJECT_SCHEMA_NAME(i.object_id) AS schema_name,
          OBJECT_NAME(i.object_id) AS table_name,
          i.name AS index_name,
          i.type_desc AS index_type,
          s.user_seeks,
          s.user_scans,
          s.user_lookups,
          s.user_updates,
          s.last_user_seek,
          s.last_user_scan,
          s.last_user_lookup,
          (SUM(a.used_pages) * 8) / 1024 AS index_size_mb,
          CASE
              WHEN s.user_seeks = 0 AND s.user_scans = 0 AND s.user_lookups = 0 THEN 'UNUSED'
              WHEN s.user_seeks + s.user_scans + s.user_lookups < 100 THEN 'LOW USAGE'
              ELSE 'ACTIVE'
          END AS usage_status
      FROM sys.indexes i
      LEFT JOIN sys.dm_db_index_usage_stats s ON i.object_id = s.object_id AND i.index_id = s.index_id AND s.database_id = DB_ID()
      INNER JOIN sys.partitions p ON i.object_id = p.object_id AND i.index_id = p.index_id
      INNER JOIN sys.allocation_units a ON p.partition_id = a.container_id
      WHERE OBJECTPROPERTY(i.object_id, 'IsUserTable') = 1
          AND i.type_desc <> 'HEAP'
      GROUP BY i.object_id, i.name, i.type_desc, s.user_seeks, s.user_scans, s.user_lookups, s.user_updates,
               s.last_user_seek, s.last_user_scan, s.last_user_lookup
      ORDER BY s.user_seeks + s.user_scans + s.user_lookups ASC, index_size_mb DESC
      """

      result = await context.execute_query(query, datasource_id)

      if not result.get("success"):
          return {"success": False, "error": result.get("error", "Failed to get index usage")}

      return {
          "success": True,
          "indexes": result.get("data", []),
          "columns": result.get("columns", [])
      }
