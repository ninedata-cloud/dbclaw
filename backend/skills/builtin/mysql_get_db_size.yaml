id: mysql_get_db_size
name: MySQL Database Size
version: 1.0.0
author: DBClaw
category: mysql
description: Get MySQL database size information including data and index sizes
tags: [mysql, storage, size, capacity]

parameters:
  - name: datasource_id
    type: integer
    required: true
    description: The database connection ID

permissions:
  - execute_query

code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      # Get database sizes
      query = """
      SELECT
          table_schema AS 'database',
          ROUND(SUM(data_length) / 1024 / 1024, 2) AS 'data_size_mb',
          ROUND(SUM(index_length) / 1024 / 1024, 2) AS 'index_size_mb',
          ROUND(SUM(data_length + index_length) / 1024 / 1024, 2) AS 'total_size_mb'
      FROM information_schema.tables
      WHERE table_schema NOT IN ('information_schema', 'mysql', 'performance_schema', 'sys')
      GROUP BY table_schema
      ORDER BY total_size_mb DESC
      """

      result = await context.execute_query(query, datasource_id)

      if not result.get("success"):
          return {"success": False, "error": result.get("error", "Failed to get database sizes")}

      return {
          "success": True,
          "databases": result.get("data", []),
          "columns": result.get("columns", [])
      }
