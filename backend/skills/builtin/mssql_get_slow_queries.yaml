id: mssql_get_slow_queries
name: SQL Server Slow Queries
version: 1.0.0
author: DBClaw
category: sqlserver
description: Get slow running queries from query store or DMVs
tags: [sqlserver, slow-queries, performance]

parameters:
  - name: datasource_id
    type: integer
    required: true
    description: The database connection ID
  - name: limit
    type: integer
    required: false
    description: Maximum number of queries to return
    validation:
      min: 1
      max: 1000

permissions:
  - execute_query

code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']
      limit = params.get('limit', 20)

      query = f"""
      SELECT TOP {limit}
          qs.execution_count,
          qs.total_elapsed_time / 1000000.0 AS total_elapsed_time_sec,
          qs.total_elapsed_time / qs.execution_count / 1000000.0 AS avg_elapsed_time_sec,
          qs.max_elapsed_time / 1000000.0 AS max_elapsed_time_sec,
          qs.total_worker_time / 1000000.0 AS total_cpu_time_sec,
          qs.total_logical_reads,
          qs.total_logical_writes,
          qs.total_physical_reads,
          qs.creation_time,
          qs.last_execution_time,
          SUBSTRING(st.text, (qs.statement_start_offset/2)+1,
              ((CASE qs.statement_end_offset
                  WHEN -1 THEN DATALENGTH(st.text)
                  ELSE qs.statement_end_offset
              END - qs.statement_start_offset)/2) + 1) AS query_text
      FROM sys.dm_exec_query_stats qs
      CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) st
      ORDER BY qs.total_elapsed_time / qs.execution_count DESC
      """

      result = await context.execute_query(query, datasource_id)

      if not result.get("success"):
          return {"success": False, "error": result.get("error", "Failed to get slow queries")}

      return {
          "success": True,
          "queries": result.get("data", []),
          "columns": result.get("columns", [])
      }
