id: list_hosts
name: List Hosts
version: 1.0.0
author: DBClaw
category: query
description: List all configured SSH hosts
tags: [hosts, configuration, ssh]

permissions: []

code: |
  async def execute(context, params):
      from backend.models.host import Host
      from backend.models.soft_delete import alive_select

      # Get all hosts
      result = await context.db.execute(alive_select(Host))
      hosts = result.scalars().all()

      # Format host info
      host_list = []
      for host in hosts:
          host_list.append({
              "id": host.id,
              "name": host.name,
              "host": host.host,
              "port": host.port,
              "username": host.username,
              "auth_type": host.auth_type,
              "os_version": host.os_version,
              "config_collected_at": host.config_collected_at.isoformat() if host.config_collected_at else None,
              "created_at": host.created_at.isoformat() if host.created_at else None,
              "updated_at": host.updated_at.isoformat() if host.updated_at else None
          })

      return {
          "success": True,
          "hosts": host_list,
          "total": len(host_list)
      }
