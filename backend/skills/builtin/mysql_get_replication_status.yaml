id: mysql_get_replication_status
name: MySQL Replication Status
version: 1.0.0
author: SmartDBA
category: mysql
description: Get MySQL database replication/cluster status
tags: [mysql, replication, cluster, high-availability]

parameters:
  - name: connection_id
    type: integer
    required: true
    description: The database connection ID

permissions:
  - execute_query

code: |
  async def execute(context, params):
      connection_id = params['connection_id']

      # Try to get slave status
      slave_result = await context.execute_query("SHOW SLAVE STATUS", connection_id)

      # Try to get master status
      master_result = await context.execute_query("SHOW MASTER STATUS", connection_id)

      return {
          "success": True,
          "slave_status": {
              "success": slave_result.get("success", False),
              "data": slave_result.get("data", []),
              "columns": slave_result.get("columns", [])
          },
          "master_status": {
              "success": master_result.get("success", False),
              "data": master_result.get("data", []),
              "columns": master_result.get("columns", [])
          }
      }
