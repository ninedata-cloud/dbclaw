id: tidb_get_hot_regions
version: 1.0.0
category: tidb
name: tidb_get_hot_regions
description: Get TiDB hot regions for read/write performance analysis
tags:
  - tidb
  - performance
  - hot-regions
parameters:
  - name: datasource_id
    type: integer
    required: true
    description: ID of the TiDB datasource
timeout: 30
permissions:
  - read_datasource
code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      from backend.models.datasource import Datasource
      from backend.services.tidb_service import TiDBConnector
      from backend.utils.encryption import decrypt_value

      # Get datasource
      datasource = await context.db.get(Datasource, datasource_id)
      if not datasource:
          return {"success": False, "error": "Datasource not found"}

      if datasource.db_type != "tidb":
          return {"success": False, "error": "Not a TiDB datasource"}

      # Decrypt password
      password = decrypt_value(datasource.password_encrypted) if datasource.password_encrypted else None

      # Connect and get hot regions
      connector = TiDBConnector(
          host=datasource.host,
          port=datasource.port,
          username=datasource.username,
          password=password,
          database=datasource.database
      )

      result = await connector.execute_query(
          "SELECT TABLE_NAME, REGION_ID, STORE_ID, PEER_ID, READ_BYTES, WRITTEN_BYTES "
          "FROM INFORMATION_SCHEMA.TIDB_HOT_REGIONS "
          "ORDER BY WRITTEN_BYTES DESC LIMIT 20"
      )
      return {"success": True, "data": result}
