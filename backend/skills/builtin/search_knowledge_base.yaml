id: search_knowledge_base
name: Search Knowledge Base
version: 1.0.0
author: DbGuard
category: knowledge
description: Search knowledge bases for relevant documentation. Use when user questions relate to custom configurations, internal procedures, or topics that might be documented in uploaded files
tags: [knowledge-base, search, documentation, rag]

parameters:
  - name: query
    type: string
    required: true
    description: Search query
  - name: kb_ids
    type: array
    required: false
    description: Optional KB IDs to search (if not provided, searches all active KBs in session)
    items:
      type: integer
  - name: top_k
    type: integer
    required: false
    default: 5
    description: Number of results to return
    min: 1
    max: 20

permissions:
  - access_kb

code: |
  async def execute(context, params):
      query = params['query']
      kb_ids = params.get('kb_ids')
      top_k = params.get('top_k', 5)

      # Search knowledge base
      results = await context.search_kb(query, kb_ids, top_k)

      return {
          "success": True,
          "results": results,
          "count": len(results)
      }
