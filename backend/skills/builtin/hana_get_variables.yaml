id: hana_get_variables
name: HANA Configuration Variables
version: 1.0.0
author: DBClaw
category: hana
description: Get SAP HANA configuration parameters from M_INIFILE_CONTENTS for troubleshooting and optimization
tags: [hana, configuration, parameters, settings]

parameters:
  - name: datasource_id
    type: integer
    required: true
    description: The database connection ID

permissions:
  - execute_query

code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      # Query top 1000 most important configuration parameters
      query = """
      SELECT TOP 1000 KEY, VALUE
      FROM SYS.M_INIFILE_CONTENTS
      WHERE LAYER_NAME = 'DEFAULT'
      ORDER BY FILE_NAME, SECTION, KEY
      """

      result = await context.execute_query(query, datasource_id)

      if not result.get("success"):
          return {"success": False, "error": result.get("error", "Failed to get variables")}

      variables = {}
      for row in result.get("data", []):
          variables[row[0]] = row[1]

      return {
          "success": True,
          "variables": variables,
          "count": len(variables)
      }
