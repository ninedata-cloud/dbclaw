id: dm_get_db_size
version: 1.0.0
category: dm
name: dm_get_db_size
description: Get DM database tablespace and data file usage
tags:
  - dm
  - storage
  - monitoring
parameters:
  - name: datasource_id
    type: integer
    required: true
    description: ID of the DM datasource
timeout: 30
permissions:
  - read_datasource
code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      from backend.models.datasource import Datasource
      from backend.services.dm_service import DMConnector
      from backend.utils.encryption import decrypt_value

      # Get datasource
      datasource = await context.db.get(Datasource, datasource_id)
      if not datasource:
          return {"success": False, "error": "Datasource not found"}

      if datasource.db_type != "dm":
          return {"success": False, "error": "Not a DM datasource"}

      # Decrypt password
      password = decrypt_value(datasource.password_encrypted) if datasource.password_encrypted else None

      # Connect and get database size
      connector = DMConnector(
          host=datasource.host,
          port=datasource.port,
          username=datasource.username,
          password=password,
          database=datasource.database
      )

      db_size = await connector.get_db_size()
      return {"success": True, "data": db_size}
