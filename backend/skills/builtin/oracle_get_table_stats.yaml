id: oracle_get_table_stats
name: Oracle Table Statistics
version: 1.0.0
author: DBClaw
category: oracle
description: Get Oracle table-level statistics including row counts, sizes, and storage information
tags: [oracle, tables, statistics, storage]

parameters:
  - name: datasource_id
    type: integer
    required: true
    description: The database connection ID

permissions:
  - execute_query

code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      query = """
      SELECT * FROM (
          SELECT
              owner,
              table_name,
              num_rows,
              blocks,
              empty_blocks,
              avg_row_len,
              ROUND(blocks * 8192 / 1024 / 1024, 2) as size_mb,
              last_analyzed,
              partitioned,
              compression,
              degree as parallel_degree
          FROM dba_tables
          WHERE owner NOT IN ('SYS', 'SYSTEM', 'OUTLN', 'DBSNMP', 'XDB', 'WMSYS', 'CTXSYS', 'MDSYS', 'OLAPSYS')
          ORDER BY num_rows DESC NULLS LAST
      )
      WHERE ROWNUM <= 100
      """

      result = await context.execute_query(query, datasource_id)

      if not result.get("success"):
          return {"success": False, "error": result.get("error", "Failed to get table stats")}

      return {
          "success": True,
          "tables": result.get("data", []),
          "columns": result.get("columns", [])
      }
