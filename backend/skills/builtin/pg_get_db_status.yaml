id: pg_get_db_status
name: PostgreSQL Database Status
version: 1.0.0
author: DBClaw
category: postgresql
description: Get current PostgreSQL database status including connections, activity, and key performance metrics
tags: [postgresql, status, performance, monitoring]

parameters:
  - name: datasource_id
    type: integer
    required: true
    description: The database connection ID

permissions:
  - execute_query

code: |
  async def execute(context, params):
      datasource_id = params['datasource_id']

      # Get database statistics
      query = """
      SELECT
          numbackends as active_connections,
          xact_commit as transactions_committed,
          xact_rollback as transactions_rolled_back,
          blks_read as blocks_read,
          blks_hit as blocks_hit,
          tup_returned as tuples_returned,
          tup_fetched as tuples_fetched,
          tup_inserted as tuples_inserted,
          tup_updated as tuples_updated,
          tup_deleted as tuples_deleted,
          conflicts,
          temp_files,
          temp_bytes,
          deadlocks,
          blk_read_time,
          blk_write_time
      FROM pg_stat_database
      WHERE datname = current_database()
      """

      result = await context.execute_query(query, datasource_id)

      if not result.get("success"):
          return {"success": False, "error": result.get("error", "Failed to get database status")}

      # Get max_connections setting
      max_conn_query = "SHOW max_connections"
      max_conn_result = await context.execute_query(max_conn_query, datasource_id)
      max_connections = 100  # default
      if max_conn_result.get("success") and max_conn_result.get("data"):
          max_connections = int(max_conn_result["data"][0][0])

      # Calculate cache hit ratio
      metrics = {}
      if result.get("data") and len(result["data"]) > 0:
          data = result["data"][0]
          blocks_read = float(data[3]) if data[3] else 0
          blocks_hit = float(data[4]) if data[4] else 0
          total_blocks = blocks_read + blocks_hit

          if total_blocks > 0:
              cache_hit_ratio = (blocks_hit / total_blocks) * 100
              metrics["cache_hit_ratio"] = f"{cache_hit_ratio:.2f}%"

          metrics["connections_active"] = data[0]
          metrics["connections_total"] = max_connections
          metrics["transactions_committed"] = data[1]
          metrics["transactions_rolled_back"] = data[2]
          metrics["deadlocks"] = data[13]

      return {
          "success": True,
          "metrics": metrics,
          "data": result.get("data", []),
          "columns": result.get("columns", [])
      }
