id: web_search_bocha
name: Web Search (Bocha AI)
version: 1.0.0
author: DBClaw
category: external_api
description: Search the web using Bocha AI search API to get real-time information
tags: [web, search, external, bocha, realtime]

parameters:
  - name: query
    type: string
    required: true
    description: Search query string
  - name: count
    type: integer
    required: false
    default: 5
    description: Number of search results to return (default 5, max 20)
    min: 1
    max: 20
  - name: summary
    type: boolean
    required: false
    default: true
    description: Whether to include AI-generated summary for each result
  - name: freshness
    type: string
    required: false
    default: noLimit
    description: Time range for search results (noLimit, day, week, month)
    enum: [noLimit, day, week, month]

permissions: [access_external_api]

timeout: 30

code: |
  async def execute(context, params):
      import aiohttp
      from typing import Dict, Any, List
      from backend.services import config_service

      query = params.get('query')
      count = params.get('count', 5)
      summary = params.get('summary', True)
      freshness = params.get('freshness', 'noLimit')

      # Get API configuration from database
      api_key = await config_service.get_config(context.db, 'bocha_api_key')
      api_url = await config_service.get_config(context.db, 'bocha_api_url')

      if not api_key:
          return {
              "success": False,
              "error": "BOCHA_API_KEY not configured in system settings",
              "message": "Please configure BOCHA_API_KEY in system configuration"
          }

      # Prepare request with correct API parameters
      headers = {
          'Authorization': f'Bearer {api_key}',
          'Content-Type': 'application/json'
      }

      payload = {
          'query': query,
          'count': count,
          'summary': summary,
          'freshness': freshness
      }

      try:
          # Disable auto_decompress to handle brotli manually (Python 3.13 compatibility)
          connector = aiohttp.TCPConnector(limit=10)
          async with aiohttp.ClientSession(connector=connector, auto_decompress=False) as session:
              async with session.post(
                  api_url,
                  json=payload,
                  headers=headers,
                  timeout=aiohttp.ClientTimeout(total=25)
              ) as response:
                  if response.status != 200:
                      # Read and decompress error response
                      raw_data = await response.read()
                      content_encoding = response.headers.get('Content-Encoding', '').lower()
                      if content_encoding == 'br':
                          import brotli
                          error_text = brotli.decompress(raw_data).decode('utf-8')
                      else:
                          error_text = raw_data.decode('utf-8')
                      return {
                          "success": False,
                          "error": f"API request failed with status {response.status}",
                          "details": error_text
                      }

                  # Read and decompress response
                  raw_data = await response.read()
                  content_encoding = response.headers.get('Content-Encoding', '').lower()
                  if content_encoding == 'br':
                      import brotli
                      import json
                      decompressed_data = brotli.decompress(raw_data)
                      data = json.loads(decompressed_data.decode('utf-8'))
                  else:
                      import json
                      data = json.loads(raw_data.decode('utf-8'))

                  # Extract search results from Bocha API response
                  # Response structure: {code, log_id, msg, data: {webPages: {value: [...]}}}
                  if data.get('code') != 200:
                      return {
                          "success": False,
                          "error": f"API returned error code {data.get('code')}",
                          "details": data.get('msg', 'Unknown error')
                      }

                  web_pages = data.get('data', {}).get('webPages', {})
                  results = web_pages.get('value', [])
                  total_matches = web_pages.get('totalEstimatedMatches', 0)

                  # Format results
                  formatted_results = []
                  for idx, result in enumerate(results[:count], 1):
                      formatted_results.append({
                          "rank": idx,
                          "title": result.get('name', ''),
                          "url": result.get('url', ''),
                          "snippet": result.get('snippet', ''),
                          "summary": result.get('summary', ''),
                          "site_name": result.get('siteName', ''),
                          "display_url": result.get('displayUrl', ''),
                          "date_published": result.get('datePublished'),
                          "language": result.get('language')
                      })

                  return {
                      "success": True,
                      "query": query,
                      "total_estimated_matches": total_matches,
                      "total_results": len(formatted_results),
                      "results": formatted_results,
                      "log_id": data.get('log_id')
                  }

      except aiohttp.ClientError as e:
          return {
              "success": False,
              "error": "Network error occurred",
              "details": str(e)
          }
      except Exception as e:
          return {
              "success": False,
              "error": "Unexpected error occurred",
              "details": str(e)
          }
