[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -q --strict-markers --cov=backend --cov-report=term-missing
markers =
    unit: pure unit tests
    service: service-level tests with mocked dependencies
    api: API-layer tests for routers
    integration: multi-module integration tests (cross service/router boundaries)
