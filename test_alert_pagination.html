<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警分页测试</title>
    <link rel="stylesheet" href="/frontend/css/main.css">
    <link rel="stylesheet" href="/frontend/css/alerts.css">
</head>
<body>
    <div style="padding: 20px;">
        <h1>告警分页功能测试</h1>

        <div style="margin: 20px 0;">
            <h2>测试说明</h2>
            <ul>
                <li>分页控件应该显示在表格底部</li>
                <li>显示当前页信息（如：显示 1-20 / 共 100 条）</li>
                <li>包含首页、上一页、页码、下一页、末页按钮</li>
                <li>包含每页显示数量选择器（10/20/50/100）</li>
                <li>点击页码或按钮应该加载对应页的数据</li>
                <li>修改每页显示数量应该重置到第一页</li>
            </ul>
        </div>

        <div style="margin: 20px 0;">
            <h2>API 测试</h2>
            <button onclick="testAPI()">测试 API 分页</button>
            <pre id="api-result" style="background: #f5f5f5; padding: 10px; margin-top: 10px;"></pre>
        </div>

        <div style="margin: 20px 0;">
            <h2>前端页面测试</h2>
            <p>请访问 <a href="/frontend/index.html#alerts" target="_blank">/frontend/index.html#alerts</a> 查看实际效果</p>
        </div>
    </div>

    <script>
        async function testAPI() {
            const result = document.getElementById('api-result');
            result.textContent = '测试中...';

            try {
                // Test events pagination
                const eventsResp = await fetch('/api/alerts/events?limit=5&offset=0');
                const eventsData = await eventsResp.json();

                // Test alerts pagination
                const alertsResp = await fetch('/api/alerts?limit=5&offset=0');
                const alertsData = await alertsResp.json();

                result.textContent = JSON.stringify({
                    events: {
                        total: eventsData.total,
                        limit: eventsData.limit,
                        offset: eventsData.offset,
                        count: eventsData.events.length
                    },
                    alerts: {
                        total: alertsData.total,
                        limit: alertsData.limit,
                        offset: alertsData.offset,
                        count: alertsData.alerts.length
                    }
                }, null, 2);
            } catch (error) {
                result.textContent = '错误: ' + error.message;
            }
        }
    </script>
</body>
</html>
