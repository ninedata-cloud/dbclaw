<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分页按钮测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-primary {
            background: #007bff;
            color: white;
            border: none;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>分页按钮点击测试</h1>

    <div class="test-section">
        <h2>测试1: 使用 onclick 属性（巡检风格）</h2>
        <div id="pagination1" style="display: flex; gap: 10px; justify-content: center;"></div>
    </div>

    <div class="test-section">
        <h2>测试2: 使用 addEventListener</h2>
        <div id="pagination2" style="display: flex; gap: 10px; justify-content: center;"></div>
    </div>

    <div id="result">
        <strong>点击结果：</strong><span id="result-text">等待点击...</span>
    </div>

    <script>
        // 模拟 AlertsPage 对象
        const AlertsPage = {
            currentPage: { events: 1 },
            goToPage: function(type, page) {
                document.getElementById('result-text').textContent =
                    `goToPage('${type}', ${page}) 被调用！当前页: ${this.currentPage[type]} -> ${page}`;
                this.currentPage[type] = page;
                renderTest1();
            }
        };

        // 测试1: 使用 onclick 属性（巡检风格）
        function renderTest1() {
            const container = document.getElementById('pagination1');
            const currentPage = AlertsPage.currentPage.events;
            const totalPages = 5;
            const buttons = [];

            // Previous button
            buttons.push(`<button class="btn btn-secondary" ${currentPage === 1 ? 'disabled' : ''} onclick="AlertsPage.goToPage('events', ${currentPage - 1})">上一页</button>`);

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                buttons.push(`<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'}" onclick="AlertsPage.goToPage('events', ${i})">${i}</button>`);
            }

            // Next button
            buttons.push(`<button class="btn btn-secondary" ${currentPage === totalPages ? 'disabled' : ''} onclick="AlertsPage.goToPage('events', ${currentPage + 1})">下一页</button>`);

            container.innerHTML = buttons.join('');
        }

        // 测试2: 使用 addEventListener
        function renderTest2() {
            const container = document.getElementById('pagination2');
            container.innerHTML = '';
            const currentPage = 1;
            const totalPages = 5;

            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.className = 'btn btn-secondary';
            prevBtn.textContent = '上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                document.getElementById('result-text').textContent =
                    `addEventListener: 上一页被点击！`;
            });
            container.appendChild(prevBtn);

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    document.getElementById('result-text').textContent =
                        `addEventListener: 页码 ${i} 被点击！`;
                });
                container.appendChild(pageBtn);
            }

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.className = 'btn btn-secondary';
            nextBtn.textContent = '下一页';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                document.getElementById('result-text').textContent =
                    `addEventListener: 下一页被点击！`;
            });
            container.appendChild(nextBtn);
        }

        // 初始化
        renderTest1();
        renderTest2();
    </script>
</body>
</html>
