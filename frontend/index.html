<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NineData 智能数据库管家</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="alternate icon" href="/assets/favicon.ico">

    <!-- Fonts -->
    <link rel="stylesheet" href="/lib/fonts/inter/300.css">
    <link rel="stylesheet" href="/lib/fonts/inter/400.css">
    <link rel="stylesheet" href="/lib/fonts/inter/500.css">
    <link rel="stylesheet" href="/lib/fonts/inter/600.css">
    <link rel="stylesheet" href="/lib/fonts/inter/700.css">
    <link rel="stylesheet" href="/lib/fonts/jetbrains-mono/400.css">
    <link rel="stylesheet" href="/lib/fonts/jetbrains-mono/500.css">

    <!-- Chart.js -->
    <script src="/lib/chart.js/dist/chart.umd.js"></script>

    <!-- Markdown-it + Highlight.js (load BEFORE Monaco to ensure global registration) -->
    <script src="/lib/markdown-it/markdown-it.min.js"></script>
    <script src="/lib/highlight.js/highlight.min.js"></script>
    <script src="/lib/highlight.js/languages/sql.min.js"></script>
    <script src="/lib/highlight.js/languages/json.min.js"></script>
    <script src="/lib/highlight.js/languages/bash.min.js"></script>
    <script src="/lib/highlight.js/languages/python.min.js"></script>
    <script src="/lib/highlight.js/languages/javascript.min.js"></script>
    <script src="/lib/highlight.js/languages/plaintext.min.js"></script>
    <link rel="stylesheet" href="/lib/highlight.js/styles/atom-one-dark.min.css">

    <!-- Lucide Icons -->
    <script src="/lib/lucide/dist/umd/lucide.js"></script>

    <!-- Monaco Editor -->
    <script src="/lib/monaco-editor/min/vs/loader.js"></script>

    <!-- CodeMirror (load after Monaco to avoid AMD conflicts) -->
    <script>
        // Temporarily disable AMD for CodeMirror
        if (typeof define === 'function' && define.amd) {
            var _define = define;
            define = undefined;
        }
    </script>
    <link rel="stylesheet" href="/lib/codemirror/lib/codemirror.css">
    <link rel="stylesheet" href="/lib/codemirror/theme/material-darker.css">
    <script src="/lib/codemirror/lib/codemirror.js"></script>
    <script src="/lib/codemirror/mode/sql/sql.js"></script>
    <script>
        // Restore AMD define
        if (typeof _define !== 'undefined') {
            define = _define;
        }
    </script>

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/charts.css">
    <link rel="stylesheet" href="/css/chat.css">
    <link rel="stylesheet" href="/css/chat-attachments.css">
    <link rel="stylesheet" href="/css/diagnosis.css">
    <link rel="stylesheet" href="/css/query.css">
    <link rel="stylesheet" href="/css/skills.css">
    <link rel="stylesheet" href="/css/inspection.css">
    <link rel="stylesheet" href="/css/system-configs.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <img src="/assets/logo.svg" alt="智能数据库管家" class="sidebar-logo">
                <span class="sidebar-title">NineData</br>数据库智能卫士</span>
            </div>
            <nav id="sidebar-nav" class="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="sidebar-version">v1.0.0</div>
            </div>
        </aside>
        <main id="main-content" class="main-content">
            <header id="page-header" class="page-header"></header>
            <div id="page-content" class="page-content"></div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal container -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-container" class="modal-container"></div>
    </div>

    <!-- App JS -->
    <script src="/js/markdown-renderer.js"></script>
    <script src="/js/utils/dom.js"></script>
    <script src="/js/utils/format.js"></script>
    <script src="/js/utils/websocket.js"></script>
    <script src="/js/utils/schema-cache.js"></script>
    <script src="/js/utils/sql-completion-provider.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/components/toast.js"></script>
    <script src="/js/components/modal.js"></script>
    <script src="/js/components/sidebar.js"></script>
    <script src="/js/components/header.js"></script>
    <script src="/js/components/metric-card.js"></script>
    <script src="/js/components/chart-panel.js"></script>
    <script src="/js/components/table.js"></script>
    <script src="/js/components/datasource-form.js"></script>
    <script src="/js/components/chat-widget.js"></script>
    <script src="/js/components/query-editor.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/datasources.js"></script>
    <script src="/js/pages/hosts.js"></script>
    <script src="/js/pages/monitor.js"></script>
    <script src="/js/pages/diagnosis.js"></script>

    <script src="/js/pages/system-configs.js"></script>
    <script src="/js/pages/login.js"></script>
    <script src="/js/pages/users.js"></script>
    <script src="/js/pages/inspection.js"></script>
    <script src="/js/app.js"></script>

</html>
