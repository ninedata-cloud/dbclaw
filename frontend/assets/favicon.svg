        stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.85"/>
  
  <!-- Database cylinder (Database) - Larger and more prominent -->
  <ellipse cx="16" cy="11" rx="6.5" ry="2.5" fill="#238636" opacity="0.95"/>
  <path d="M9.5 11 L9.5 14.5 C9.5 15.9 12.3 17 16 17 C19.7 17 22.5 15.9 22.5 14.5 L22.5 11" 
        fill="#238636" opacity="0.9"/>
  <ellipse cx="16" cy="14.5" rx="6.5" ry="2.5" fill="#2ea043"/>
  
  <!-- AI Neural nodes (AI) - Larger nodes -->
  <circle cx="12" cy="20" r="1.8" fill="#f778ba"/>
  <circle cx="16" cy="22.5" r="1.8" fill="#f778ba"/>
  <circle cx="20" cy="20" r="1.8" fill="#f778ba"/>
  
