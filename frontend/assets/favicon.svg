  <line x1="20" y1="20" x2="16" y2="22.5" stroke="#f778ba" stroke-width="1.2" opacity="0.6"/>
  <line x1="12" y1="20" x2="20" y2="20" stroke="#f778ba" stroke-width="1.2" opacity="0.6"/>
  
  <!-- Lock symbol (Security accent) - Larger -->
  <rect x="13.5" y="17.5" width="5" height="4.5" rx="0.8" fill="#58a6ff" opacity="0.8"/>
  <path d="M14.5 17.5 L14.5 16 C14.5 15.2 15.2 14.5 16 14.5 C16.8 14.5 17.5 15.2 17.5 16 L17.5 17.5" 
