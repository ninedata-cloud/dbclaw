<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Modern gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Database gradient (blue-cyan) -->
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <!-- AI accent gradient (purple-pink) -->
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" stroke="url(#dbGrad)" stroke-width="0.5" fill="none" opacity="0.3"/>
  
  <!-- Main database cylinder - Large and prominent -->
  <!-- Top ellipse -->
  <ellipse cx="32" cy="18" rx="18" ry="6" fill="url(#dbGrad)" opacity="0.9" filter="url(#glow)"/>
  
  <!-- Cylinder body with gradient -->
  <rect x="14" y="18" width="36" height="20" fill="url(#dbGrad)" opacity="0.85"/>
  
  <!-- Middle separator line -->
  <ellipse cx="32" cy="25" rx="18" ry="6" fill="#1e293b" opacity="0.4"/>
  <ellipse cx="32" cy="25" rx="18" ry="6" fill="url(#dbGrad)" opacity="0.6"/>
  
  <!-- Bottom separator line -->
  <ellipse cx="32" cy="32" rx="18" ry="6" fill="#1e293b" opacity="0.4"/>
  <ellipse cx="32" cy="32" rx="18" ry="6" fill="url(#dbGrad)" opacity="0.6"/>
  
  <!-- Bottom ellipse -->
  <ellipse cx="32" cy="38" rx="18" ry="6" fill="url(#dbGrad)" opacity="0.95"/>
  
  <!-- Data flow lines (representing data movement) -->
  <path d="M 14 22 Q 8 28 14 34" stroke="url(#aiGrad)" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="2,2">
    <animate attributeName="stroke-dashoffset" from="0" to="4" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M 50 22 Q 56 28 50 34" stroke="url(#aiGrad)" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="2,2">
    <animate attributeName="stroke-dashoffset" from="0" to="4" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <!-- AI brain icon - Simplified and modern -->
  <g transform="translate(32, 48)">
    <!-- Central AI core -->
    <circle cx="0" cy="0" r="5" fill="url(#aiGrad)" opacity="0.9" filter="url(#glow)"/>
    
    <!-- Neural connections - Minimal and elegant -->
    <circle cx="-6" cy="-3" r="2" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="6" cy="-3" r="2" fill="#ec4899" opacity="0.7"/>
    <circle cx="-6" cy="3" r="2" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="6" cy="3" r="2" fill="#ec4899" opacity="0.7"/>
    
    <!-- Connection lines -->
    <line x1="-6" y1="-3" x2="0" y2="0" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="6" y1="-3" x2="0" y2="0" stroke="#ec4899" stroke-width="1" opacity="0.4"/>
    <line x1="-6" y1="3" x2="0" y2="0" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="6" y1="3" x2="0" y2="0" stroke="#ec4899" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Sparkle effects - Tech accent -->
  <circle cx="22" cy="12" r="1.5" fill="#3b82f6" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="14" r="1.5" fill="#06b6d4" opacity="0.8">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="44" r="1" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="46" cy="42" r="1" fill="#ec4899" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
