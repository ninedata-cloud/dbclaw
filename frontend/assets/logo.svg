<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background with gradient effect -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>
  
  <!-- Shield outline (Security) - Much larger -->
  <path d="M32 6 L54 12 L54 30 C54 42 44 52 32 58 C20 52 10 42 10 30 L10 12 Z" 
        stroke="url(#shieldGrad)" stroke-width="3" fill="none" opacity="0.9"/>
  
  <!-- Inner shield glow -->
  <path d="M32 9 L50 14 L50 30 C50 40 42 49 32 54 C22 49 14 40 14 30 L14 14 Z" 
        stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.3"/>
  
  <!-- Database stack (Database) - Much larger, 3 layers -->
  <ellipse cx="32" cy="20" rx="13" ry="4.5" fill="#238636" opacity="0.95"/>
  <path d="M19 20 L19 25 C19 27.5 24.8 29.5 32 29.5 C39.2 29.5 45 27.5 45 25 L45 20" 
        fill="#238636" opacity="0.9"/>
  <ellipse cx="32" cy="25" rx="13" ry="4.5" fill="#2ea043"/>
  
  <path d="M19 25 L19 30 C19 32.5 24.8 34.5 32 34.5 C39.2 34.5 45 32.5 45 30 L45 25" 
        fill="#2ea043" opacity="0.9"/>
  <ellipse cx="32" cy="30" rx="13" ry="4.5" fill="#3fb950"/>
  
  <!-- AI Neural network (AI) - Larger nodes and more prominent -->
  <!-- Top layer nodes -->
  <circle cx="24" cy="39" r="2.8" fill="#f778ba"/>
  <circle cx="32" cy="38" r="2.8" fill="#f778ba"/>
  <circle cx="40" cy="39" r="2.8" fill="#f778ba"/>
  
  <!-- Middle layer nodes -->
  <circle cx="27" cy="46" r="2.8" fill="#db61a2"/>
  <circle cx="37" cy="46" r="2.8" fill="#db61a2"/>
  
  <!-- Bottom layer node -->
  <circle cx="32" cy="52" r="3.2" fill="#bc4a94"/>
  
  <!-- Neural connections - Thicker lines -->
  <line x1="24" y1="39" x2="27" y2="46" stroke="#f778ba" stroke-width="1.8" opacity="0.5"/>
  <line x1="32" y1="38" x2="27" y2="46" stroke="#f778ba" stroke-width="1.8" opacity="0.5"/>
  <line x1="32" y1="38" x2="37" y2="46" stroke="#f778ba" stroke-width="1.8" opacity="0.5"/>
  <line x1="40" y1="39" x2="37" y2="46" stroke="#f778ba" stroke-width="1.8" opacity="0.5"/>
  <line x1="27" y1="46" x2="32" y2="52" stroke="#db61a2" stroke-width="1.8" opacity="0.5"/>
  <line x1="37" y1="46" x2="32" y2="52" stroke="#db61a2" stroke-width="1.8" opacity="0.5"/>
  
  <!-- Lock symbol (Security accent) - Larger and more visible -->
  <rect x="27.5" y="23" width="9" height="9" rx="1.5" fill="#58a6ff" opacity="0.85"/>
  <path d="M29.5 23 L29.5 20.5 C29.5 19.1 30.6 18 32 18 C33.4 18 34.5 19.1 34.5 20.5 L34.5 23" 
        stroke="#58a6ff" stroke-width="2" fill="none" opacity="0.85"/>
  <circle cx="32" cy="27.5" r="1.5" fill="#0d1117"/>
  
  <!-- Sparkle effects for AI - Larger -->
  <circle cx="20" cy="36" r="1.2" fill="#f778ba" opacity="0.8"/>
  <circle cx="44" cy="37" r="1.2" fill="#f778ba" opacity="0.8"/>
  <circle cx="32" cy="56" r="1.2" fill="#bc4a94" opacity="0.8"/>
</svg>
