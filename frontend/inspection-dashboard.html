<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Inspection - SmartDBA</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/inspection.css">
</head>
<body>
    <div class="container">
        <h1>🔍 Database Intelligent Inspection</h1>

        <div class="controls">
            <select id="datasourceSelect" class="select">
                <option value="">Select Database...</option>
            </select>
            <button id="manualInspectBtn" class="btn btn-primary" disabled>Manual Inspect</button>
            <button id="configBtn" class="btn btn-secondary" disabled>Configure</button>
        </div>

        <div id="configPanel" class="config-panel" style="display: none;">
            <h3>Inspection Configuration</h3>
            <label>
                <input type="checkbox" id="enabledCheck"> Enabled
            </label>
            <label>
                Schedule Interval:
                <select id="scheduleInterval">
                    <option value="3600">Hourly</option>
                    <option value="86400">Daily</option>
                    <option value="604800">Weekly</option>
                </select>
            </label>
            <label>
                <input type="checkbox" id="useAiCheck"> Use AI Analysis
            </label>
            <button id="saveConfigBtn" class="btn btn-primary">Save</button>
            <button id="cancelConfigBtn" class="btn btn-secondary">Cancel</button>
        </div>

        <div id="reportList" class="report-list">
            <h3>Inspection Reports</h3>
            <div id="reports"></div>
        </div>

        <div id="reportModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="reportContent"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/pages/inspection-dashboard.js"></script>
</body>
</html>
