<!DOCTYPE html>
<html>
<head>
    <title>Test Skill Authorization Defaults</title>
</head>
<body>
    <h1>测试 Skill 授权默认值</h1>
    <div id="result"></div>

    <script>
        // 模拟前端的 _normalizeSkillAuthorizations 逻辑
        function _normalizeSkillAuthorizations(authorizations = null, legacyDisabledTools = [], catalog = null) {
            const defaults = {
                platform_operations: false,
                high_privilege_operations: false,
                knowledge_retrieval: true,
            };

            const catalogGroups = catalog?.groups || [];
            catalogGroups.forEach(group => {
                defaults[group.id] = group.enabled_by_default !== false;
            });

            const normalized = { ...defaults };
            if (authorizations && typeof authorizations === 'object') {
                Object.keys(defaults).forEach(key => {
                    if (authorizations[key] !== undefined) {
                        normalized[key] = Boolean(authorizations[key]);
                    }
                });
            }

            const legacyGroupByTool = {
                manage_alert_settings: 'platform_operations',
                list_datasources: 'platform_operations',
                query_monitoring_history: 'platform_operations',
                query_alert_statistics: 'platform_operations',
                execute_any_sql: 'high_privilege_operations',
                execute_any_os_command: 'high_privilege_operations',
                fetch_webpage: 'knowledge_retrieval',
                web_search_bocha: 'knowledge_retrieval',
                list_documents: 'knowledge_retrieval',
                read_document: 'knowledge_retrieval',
            };
            (legacyDisabledTools || []).forEach(toolName => {
                const groupId = legacyGroupByTool[toolName];
                if (groupId) {
                    normalized[groupId] = false;
                }
            });

            return normalized;
        }

        // 模拟后端返回的 catalog
        const mockCatalog = {
            groups: [
                {
                    id: 'platform_operations',
                    label: '平台操作',
                    enabled_by_default: false
                },
                {
                    id: 'high_privilege_operations',
                    label: '高权限操作',
                    enabled_by_default: false
                },
                {
                    id: 'knowledge_retrieval',
                    label: '知识检索',
                    enabled_by_default: true
                }
            ]
        };

        // 测试场景
        const result = document.getElementById('result');

        // 场景1：首次加载，无授权配置，有 catalog
        const test1 = _normalizeSkillAuthorizations(null, [], mockCatalog);
        result.innerHTML += `<h2>场景1：首次加载（有 catalog）</h2>`;
        result.innerHTML += `<pre>${JSON.stringify(test1, null, 2)}</pre>`;

        // 场景2：首次加载，无授权配置，无 catalog（加载失败）
        const test2 = _normalizeSkillAuthorizations(null, [], null);
        result.innerHTML += `<h2>场景2：首次加载（catalog 加载失败）</h2>`;
        result.innerHTML += `<pre>${JSON.stringify(test2, null, 2)}</pre>`;

        // 场景3：用户手动启用了平台操作
        const test3 = _normalizeSkillAuthorizations({ platform_operations: true }, [], mockCatalog);
        result.innerHTML += `<h2>场景3：用户手动启用平台操作</h2>`;
        result.innerHTML += `<pre>${JSON.stringify(test3, null, 2)}</pre>`;

        // 验证
        result.innerHTML += `<h2>验证结果</h2>`;
        if (test1.platform_operations === false && test1.high_privilege_operations === false) {
            result.innerHTML += `<p style="color: green;">✓ 场景1 通过：平台操作和高权限操作默认禁用</p>`;
        } else {
            result.innerHTML += `<p style="color: red;">✗ 场景1 失败：默认值不正确</p>`;
        }

        if (test2.platform_operations === false && test2.high_privilege_operations === false) {
            result.innerHTML += `<p style="color: green;">✓ 场景2 通过：即使 catalog 加载失败，硬编码默认值也是正确的</p>`;
        } else {
            result.innerHTML += `<p style="color: red;">✗ 场景2 失败：硬编码默认值不正确</p>`;
        }
    </script>
</body>
</html>
