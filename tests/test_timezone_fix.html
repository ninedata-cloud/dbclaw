<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时区修复测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-case {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-case h3 {
            margin-top: 0;
        }
        .result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
        }
        code {
            background-color: #f4f4f4;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>时区修复测试</h1>
    <p>测试后端 UTC 时间在前端的正确解析</p>

    <div id="test-results"></div>

    <script>
        // 模拟 MonitorPage 的 _parseUTCDateTime 方法
        function parseUTCDateTime(dateInput) {
            if (dateInput instanceof Date) {
                return dateInput;
            }
            const dateStr = String(dateInput);
            if (!dateStr.endsWith('Z') && !dateStr.includes('+') && !dateStr.includes('T')) {
                return new Date(dateStr.replace(' ', 'T') + 'Z');
            } else if (!dateStr.endsWith('Z') && dateStr.includes('T') && !dateStr.includes('+')) {
                return new Date(dateStr + 'Z');
            }
            return new Date(dateStr);
        }

        // 测试用例
        const tests = [
            {
                name: '测试 1: 后端返回的 UTC 时间字符串（空格分隔）',
                input: '2024-04-20 10:30:00',
                expectedUTC: '2024-04-20T10:30:00Z',
                description: '后端常见格式，应该被解析为 UTC 时间'
            },
            {
                name: '测试 2: ISO 格式但无时区标识',
                input: '2024-04-20T10:30:00',
                expectedUTC: '2024-04-20T10:30:00Z',
                description: 'ISO 格式但缺少 Z，应该被解析为 UTC'
            },
            {
                name: '测试 3: 完整的 ISO UTC 格式',
                input: '2024-04-20T10:30:00Z',
                expectedUTC: '2024-04-20T10:30:00Z',
                description: '已经包含 Z 标识，直接解析'
            },
            {
                name: '测试 4: 带时区偏移的格式',
                input: '2024-04-20T10:30:00+08:00',
                expectedUTC: '2024-04-20T02:30:00Z',
                description: '带时区偏移，应该正确转换为 UTC'
            }
        ];

        const resultsDiv = document.getElementById('test-results');

        tests.forEach(test => {
            const testDiv = document.createElement('div');
            testDiv.className = 'test-case';

            const title = document.createElement('h3');
            title.textContent = test.name;
            testDiv.appendChild(title);

            const desc = document.createElement('p');
            desc.textContent = test.description;
            testDiv.appendChild(desc);

            const inputP = document.createElement('p');
            inputP.innerHTML = `<strong>输入:</strong> <code>${test.input}</code>`;
            testDiv.appendChild(inputP);

            // 执行测试
            const parsed = parseUTCDateTime(test.input);
            const parsedUTC = parsed.toISOString();
            const expectedDate = new Date(test.expectedUTC);
            const pass = parsedUTC === expectedDate.toISOString();

            const resultDiv = document.createElement('div');
            resultDiv.className = `result ${pass ? 'pass' : 'fail'}`;
            resultDiv.innerHTML = `
                <strong>结果:</strong> ${pass ? '✓ 通过' : '✗ 失败'}<br>
                <strong>解析结果 (UTC):</strong> <code>${parsedUTC}</code><br>
                <strong>期望结果 (UTC):</strong> <code>${expectedDate.toISOString()}</code><br>
                <strong>本地时间显示:</strong> <code>${parsed.toLocaleString('zh-CN')}</code>
            `;
            testDiv.appendChild(resultDiv);

            resultsDiv.appendChild(testDiv);
        });

        // 额外测试：时间过滤逻辑
        const filterTestDiv = document.createElement('div');
        filterTestDiv.className = 'test-case';
        filterTestDiv.innerHTML = '<h3>测试 5: 时间范围过滤逻辑</h3>';

        const now = Date.now();
        const rangeMinutes = 60;
        const rangeMs = rangeMinutes * 60 * 1000;
        const cutoffTime = now - rangeMs;

        // 模拟后端返回的指标（UTC 时间）
        const mockMetrics = [
            { collected_at: new Date(now - 30 * 60 * 1000).toISOString().replace('T', ' ').slice(0, 19), value: 100 }, // 30分钟前
            { collected_at: new Date(now - 90 * 60 * 1000).toISOString().replace('T', ' ').slice(0, 19), value: 200 }, // 90分钟前
            { collected_at: new Date(now - 45 * 60 * 1000).toISOString().replace('T', ' ').slice(0, 19), value: 300 }, // 45分钟前
        ];

        const filtered = mockMetrics.filter(m => {
            const timestamp = parseUTCDateTime(m.collected_at).getTime();
            return timestamp >= cutoffTime;
        });

        const filterResult = document.createElement('div');
        filterResult.className = `result ${filtered.length === 2 ? 'pass' : 'fail'}`;
        filterResult.innerHTML = `
            <strong>测试场景:</strong> 过滤最近 ${rangeMinutes} 分钟的数据<br>
            <strong>总数据:</strong> ${mockMetrics.length} 条<br>
            <strong>过滤后:</strong> ${filtered.length} 条<br>
            <strong>期望:</strong> 2 条（30分钟和45分钟前的数据）<br>
            <strong>结果:</strong> ${filtered.length === 2 ? '✓ 通过' : '✗ 失败'}
        `;
        filterTestDiv.appendChild(filterResult);
        resultsDiv.appendChild(filterTestDiv);
    </script>
</body>
</html>
